services:
  - type: web
    name: flexflow-app
    runtime: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        value: "file:/app/prisma/data/dev.db"
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: ""
    disk:
      name: sqlite-data
      mountPath: /app/prisma/data
      sizeGB: 1
